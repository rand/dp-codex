name: ci

on:
  pull_request:
  push:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dev dependencies
        run: uv sync --dev

      - name: Run quality gates
        run: make check

      - name: Run enforcement checks (pre-commit parity)
        run: uv run dp enforce pre-commit --policy dp-policy.json --json

      - name: Run enforcement checks (pre-push parity)
        run: uv run dp enforce pre-push --policy dp-policy.json --json
